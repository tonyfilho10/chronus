[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/api/schema/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.releaseCommand]]
command = "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
