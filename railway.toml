[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/api/schema/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
releaseCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py seed_tutorials && python manage.py create_admin"
