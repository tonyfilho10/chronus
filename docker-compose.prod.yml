version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - redis
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - redis
    restart: always

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    restart: always

volumes:
  static_volume:
  media_volume:
  redis_data:
